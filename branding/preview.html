<!doctype html><html><head><meta charset="utf-8"><title>DeployBox — Logo</title>
<style>
  body{background:#09090b;color:#eee;font-family:Inter,system-ui,sans-serif;margin:0;padding:48px;}
  h1{font-size:20px} h2{font-size:13px;color:#888;margin:36px 0 12px;text-transform:uppercase;letter-spacing:.1em}
  .row{display:flex;align-items:flex-end;gap:28px;flex-wrap:wrap}
  .cell{text-align:center} .cell span{display:block;margin-top:8px;font-size:11px;color:#666}
  .word{display:flex;align-items:center;gap:14px;margin-top:16px}
  .word b{font-size:28px;letter-spacing:-0.02em} .word b i{font-style:normal;color:#818cf8}
  .light{background:#f6f7fb;padding:24px;border-radius:14px;display:inline-flex;gap:28px;align-items:flex-end}
</style></head><body>
<h1>DeployBox — bộ logo đề xuất</h1>

<h2>A — Huy hiệu "mũi tên bay khỏi hộp" (khuyên dùng)</h2>
<div class="row">
  <div class="cell"><img src="logo-a-badge.svg" width="160"><span>160px</span></div>
  <div class="cell"><img src="logo-a-badge.svg" width="64"><span>64px</span></div>
  <div class="cell"><img src="logo-a-badge.svg" width="32"><span>32px</span></div>
  <div class="cell"><img src="logo-a-badge.svg" width="16"><span>16px (favicon)</span></div>
</div>
<div class="word"><img src="logo-a-badge.svg" width="44"><b>Deploy<i>Box</i></b></div>

<h2>B — Khối hộp isometric + mũi tên</h2>
<div class="row">
  <div class="cell"><img src="logo-b-cube.svg" width="160"><span>160px</span></div>
  <div class="cell"><img src="logo-b-cube.svg" width="64"><span>64px</span></div>
  <div class="cell"><img src="logo-b-cube.svg" width="32"><span>32px</span></div>
  <div class="cell"><img src="logo-b-cube.svg" width="16"><span>16px</span></div>
</div>

<h2>C — Bản outline không nền (nền sáng / tài liệu / in ấn)</h2>
<div class="light">
  <img src="logo-c-outline.svg" width="120">
  <img src="logo-c-outline.svg" width="48">
</div>
</body></html>
